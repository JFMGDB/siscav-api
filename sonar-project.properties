# SonarQube / SonarCloud — SISCAV API
#
# REQUIRED: Replace the CHANGE_ME_* placeholders below before enabling SonarCloud analysis.
#   sonar.organization — your SonarCloud organization key (from project onboarding)
#   sonar.projectKey   — your SonarCloud project key (from project onboarding)
#
# SonarQube Server (self-hosted): set repository variable SONAR_HOST_URL in GitHub Actions
# (e.g. https://sonar.example.com). You may comment out sonar.organization if the server
# does not use it.

sonar.organization=CHANGE_ME_ORG_KEY
sonar.projectKey=CHANGE_ME_PROJECT_KEY

sonar.sources=apps
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.13
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/__pycache__/**,**/*.pyc,**/alembic/versions/**,.venv/**,venv/**
